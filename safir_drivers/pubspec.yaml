name: safir_drivers
description: "Safir Taxi Driver Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  connectivity_plus: ^6.0.4
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.1.0
  firebase_database:
  firebase_storage:
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  flutter_geofire: 
  firebase_messaging:
  flutter_notification_channel: ^3.1.0
  assets_audio_player:
  http:
  flutter_polyline_points:
  url_launcher:

  cupertino_icons: ^1.0.6
  firebase_core: ^3.3.0
  restart_app: ^1.2.1
  country_picker:
  rounded_loading_button: '2.1.0'
  google_sign_in:
  provider:
  pinput: ^5.0.0
  image_cropper: 
  path_provider:
  cached_network_image: '3.3.1'
  shared_preferences:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # بخش دارایی‌ها، صداها و تصاویر اختصاصی برنامه راننده سفیر
  assets:
    - assets/audio/
    - assets/images/
    - assets/vehicles/
    - assets/auth/
    - themes/

  # بخش فعال‌سازی فونت ایران یکان برای کل پروژه رانندگان سفیر
  fonts:
    - family: IranYekan
      fonts:
        - asset: assets/fonts/IranYekan-Regular.ttf
        - asset: assets/fonts/IranYekan-Bold.ttf
          weight: 700
