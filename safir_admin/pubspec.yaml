name: safir_admin
description: "A new Flutter project for Safir Admin Panel."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.0
  provider: ^6.1.1
  flutter_admin_scaffold: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: IranYekan
      fonts:
        - asset: fonts/iranyekanwebregular.ttf
        - asset: fonts/iranyekanwebbold.ttf
          weight: 700
